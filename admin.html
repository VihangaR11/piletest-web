<!DOCTYPE html><html lang="en"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Admin Dashboard | PileTeST</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@700;800;900&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
:root{--navy:#0B1D33;--navy2:#122944;--green:#00C896;--green2:#00A07A;
  --green3:rgba(0,200,150,.1);--red:#DC2626;--amber:#D97706;
  --white:#fff;--gray1:#F0F4F8;--gray2:#E2E8F0;--text:#0F172A;--text3:#64748B;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Inter',sans-serif;background:var(--gray1);color:var(--text);}
a{text-decoration:none;color:inherit;}

/* SIDEBAR */
.sidebar{position:fixed;left:0;top:0;bottom:0;width:220px;
  background:var(--navy);display:flex;flex-direction:column;}
.sb-logo{padding:1.5rem 1.2rem;border-bottom:1px solid rgba(255,255,255,.08);}
.sb-logo .lb{background:var(--green);color:var(--navy);font-family:'Barlow Condensed',sans-serif;
  font-size:.9rem;font-weight:900;padding:.2rem .5rem;border-radius:3px;}
.sb-logo .lt{color:rgba(255,255,255,.5);font-size:.68rem;margin-top:.3rem;}
.sb-nav{padding:1rem 0;flex:1;}
.sb-item{display:flex;align-items:center;gap:.7rem;padding:.7rem 1.2rem;
  color:rgba(255,255,255,.5);font-size:.82rem;font-weight:500;transition:all .15s;cursor:pointer;}
.sb-item:hover,.sb-item.active{background:rgba(255,255,255,.06);color:#fff;}
.sb-item .ic{font-size:1rem;width:20px;}
.sb-badge{margin-left:auto;background:var(--green);color:var(--navy);
  font-size:.6rem;font-weight:700;padding:.1rem .45rem;border-radius:100px;}

/* MAIN */
.main{margin-left:220px;padding:2rem;min-height:100vh;}
.page-title{font-family:'Barlow Condensed',sans-serif;font-size:2rem;
  font-weight:800;color:var(--text);margin-bottom:1.5rem;}

/* STAT CARDS */
.stat-row{display:grid;grid-template-columns:repeat(4,1fr);gap:1rem;margin-bottom:1.5rem;}
.stat-card{background:var(--white);border:1px solid var(--gray2);border-radius:10px;
  padding:1.2rem;border-left:4px solid var(--green);}
.sc-n{font-family:'Barlow Condensed',sans-serif;font-size:2.2rem;font-weight:800;color:var(--text);}
.sc-l{font-size:.72rem;color:var(--text3);text-transform:uppercase;letter-spacing:.08em;margin-top:.2rem;}

/* TABLE */
.table-card{background:var(--white);border:1px solid var(--gray2);border-radius:10px;overflow:hidden;}
.tc-header{padding:1rem 1.2rem;border-bottom:1px solid var(--gray2);
  display:flex;align-items:center;justify-content:space-between;}
.tc-title{font-weight:700;font-size:.95rem;}
.filter-row{display:flex;gap:.5rem;}
.filter-btn{border:1px solid var(--gray2);background:var(--white);color:var(--text3);
  font-size:.75rem;padding:.3rem .8rem;border-radius:100px;cursor:pointer;transition:all .15s;}
.filter-btn.active,.filter-btn:hover{background:var(--navy);color:#fff;border-color:var(--navy);}
table{width:100%;border-collapse:collapse;}
th{background:var(--gray1);color:var(--text3);font-size:.68rem;font-weight:700;
  text-transform:uppercase;letter-spacing:.07em;padding:.6rem 1rem;text-align:left;}
td{padding:.65rem 1rem;border-bottom:1px solid var(--gray2);font-size:.82rem;vertical-align:middle;}
tr:hover td{background:#FAFAFA;}
tr:last-child td{border:none;}
.badge{display:inline-block;font-size:.65rem;font-weight:700;padding:.15rem .5rem;border-radius:4px;}
.badge-new{background:#DBEAFE;color:#1D4ED8;}
.badge-read{background:var(--gray2);color:var(--text3);}
.badge-replied{background:#DCFCE7;color:#15803D;}
.badge-archived{background:#F3F4F6;color:#6B7280;}

/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:100;
  display:none;align-items:center;justify-content:center;}
.modal-overlay.open{display:flex;}
.modal{background:var(--white);border-radius:12px;width:90%;max-width:580px;
  max-height:85vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.2);}
.modal-header{padding:1.2rem 1.5rem;border-bottom:1px solid var(--gray2);
  display:flex;justify-content:space-between;align-items:center;}
.modal-title{font-weight:700;font-size:1rem;}
.modal-close{font-size:1.3rem;cursor:pointer;color:var(--text3);border:none;background:none;}
.modal-body{padding:1.5rem;}
.detail-row{display:flex;gap:1rem;margin-bottom:.8rem;font-size:.84rem;}
.detail-label{color:var(--text3);width:110px;flex-shrink:0;font-weight:600;}
.detail-value{color:var(--text);line-height:1.6;}
.status-select{border:1px solid var(--gray2);border-radius:6px;
  padding:.4rem .7rem;font-size:.8rem;font-family:'Inter',sans-serif;margin-left:.5rem;}

/* EMPTY STATE */
.empty-state{padding:3rem;text-align:center;color:var(--text3);}
.empty-state .es-icon{font-size:2.5rem;margin-bottom:.8rem;}

/* LOADING */
.loading{padding:3rem;text-align:center;color:var(--text3);}
@keyframes spin{to{transform:rotate(360deg)}}
.spinner{display:inline-block;width:24px;height:24px;border:3px solid var(--gray2);
  border-top-color:var(--green);border-radius:50%;animation:spin .7s linear infinite;margin-bottom:.8rem;}
</style>
  <meta name="description" content="Internal PileTeST administration dashboard.">
<link rel="canonical" href="https://www.piletest.lk/admin.html">
</head>
<body>

<!-- SIDEBAR -->
<aside class="sidebar">
  <div class="sb-logo">
    <div class="lb">PiLETeST</div>
    <div class="lt">Admin Dashboard</div>
  </div>
  <nav class="sb-nav">
    <div class="sb-item active" onclick="showSection('submissions')">
      <span class="ic">📩</span> Submissions
      <span class="sb-badge" id="new-badge">0</span>
    </div>
    <div class="sb-item" onclick="showSection('stats')">
      <span class="ic">📊</span> Analytics
    </div>
    <a href="index.html" class="sb-item">
      <span class="ic">🌐</span> View Website
    </a>
  </nav>
  <div style="padding:1rem 1.2rem;border-top:1px solid rgba(255,255,255,.08);">
    <div style="color:rgba(255,255,255,.3);font-size:.68rem;line-height:1.6;">
      PileTeST Consultants<br>Admin Panel v1.0
    </div>
  </div>
</aside>

<!-- MAIN -->
<main class="main" id="main-content">

  <!-- SUBMISSIONS SECTION -->
  <div id="section-submissions">
    <div class="page-title">📩 Contact Submissions</div>

    <!-- Stats strip -->
    <div class="stat-row">
      <div class="stat-card" style="border-color:#1D4ED8;">
        <div class="sc-n" id="s-total">—</div>
        <div class="sc-l">Total</div>
      </div>
      <div class="stat-card" style="border-color:var(--green);">
        <div class="sc-n" id="s-new">—</div>
        <div class="sc-l">New</div>
      </div>
      <div class="stat-card" style="border-color:#15803D;">
        <div class="sc-n" id="s-replied">—</div>
        <div class="sc-l">Replied</div>
      </div>
      <div class="stat-card" style="border-color:var(--amber);">
        <div class="sc-n" id="s-today">—</div>
        <div class="sc-l">Today</div>
      </div>
    </div>

    <!-- Table -->
    <div class="table-card">
      <div class="tc-header">
        <span class="tc-title">All Submissions</span>
        <div class="filter-row">
          <button class="filter-btn active" onclick="filterSubmissions('')">All</button>
          <button class="filter-btn" onclick="filterSubmissions('new')">New</button>
          <button class="filter-btn" onclick="filterSubmissions('read')">Read</button>
          <button class="filter-btn" onclick="filterSubmissions('replied')">Replied</button>
          <button class="filter-btn" onclick="filterSubmissions('archived')">Archived</button>
        </div>
      </div>
      <div id="table-container">
        <div class="loading">
          <div class="spinner"></div><br>Loading submissions…
        </div>
      </div>
    </div>
  </div>

  <!-- ANALYTICS SECTION -->
  <div id="section-stats" style="display:none;">
    <div class="page-title">📊 Analytics</div>
    <div class="table-card">
      <div class="tc-header"><span class="tc-title">Submissions by Service</span></div>
      <div id="analytics-container">
        <div class="loading"><div class="spinner"></div><br>Loading analytics…</div>
      </div>
    </div>
  </div>

</main>

<!-- DETAIL MODAL -->
<div class="modal-overlay" id="modal">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title">Submission Detail</span>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body" id="modal-body">Loading…</div>
  </div>
</div>

<script>
const API = 'http://localhost:3001/api';
let currentFilter = '';
let currentId = null;

// ── INIT ──────────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', () => {
  loadStats();
  loadSubmissions('');
});

// ── SECTIONS ──────────────────────────────────────────────────
function showSection(name) {
  document.querySelectorAll('[id^="section-"]').forEach(el => el.style.display = 'none');
  document.getElementById(`section-${name}`).style.display = 'block';
  document.querySelectorAll('.sb-item').forEach(el => el.classList.remove('active'));
  event.currentTarget.classList.add('active');
  if (name === 'stats') loadAnalytics();
}

// ── LOAD STATS ────────────────────────────────────────────────
async function loadStats() {
  try {
    const res  = await fetch(`${API}/admin/stats`);
    const json = await res.json();
    if (!json.success) return;
    const s = json.stats;
    document.getElementById('s-total').textContent   = s.total   || 0;
    document.getElementById('s-new').textContent     = s.new_count || 0;
    document.getElementById('s-replied').textContent = s.replied_count || 0;
    document.getElementById('s-today').textContent   = s.today_count || 0;
    document.getElementById('new-badge').textContent = s.new_count || 0;
  } catch { /* silent fail */ }
}

// ── LOAD SUBMISSIONS ──────────────────────────────────────────
async function loadSubmissions(filter) {
  currentFilter = filter;
  const tc = document.getElementById('table-container');
  tc.innerHTML = '<div class="loading"><div class="spinner"></div><br>Loading…</div>';

  const url = filter
    ? `${API}/admin/submissions?status=${filter}&limit=50`
    : `${API}/admin/submissions?limit=50`;

  try {
    const res  = await fetch(url);
    const json = await res.json();
    if (!json.success || !json.data.length) {
      tc.innerHTML = '<div class="empty-state"><div class="es-icon">📭</div><div>No submissions found.</div></div>';
      return;
    }
    renderTable(json.data);
  } catch (err) {
    tc.innerHTML = `<div class="empty-state"><div class="es-icon">❌</div><div>Cannot connect to API.<br>Is the server running on port 3001?</div></div>`;
  }
}

function filterSubmissions(f) {
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  event.currentTarget.classList.add('active');
  loadSubmissions(f);
}

// ── RENDER TABLE ──────────────────────────────────────────────
function renderTable(rows) {
  const tc = document.getElementById('table-container');
  tc.innerHTML = `
    <table>
      <thead><tr>
        <th>#</th><th>Name</th><th>Email</th><th>Service</th>
        <th>Status</th><th>Date</th><th>Action</th>
      </tr></thead>
      <tbody>
        ${rows.map(r => `
          <tr>
            <td style="font-family:monospace;color:#94A3B8;">${r.id}</td>
            <td><strong>${esc(r.first_name)} ${esc(r.last_name)}</strong>
              ${r.company ? `<br><span style="color:#94A3B8;font-size:.75rem;">${esc(r.company)}</span>` : ''}
            </td>
            <td><a href="mailto:${esc(r.email)}" style="color:#1D4ED8;">${esc(r.email)}</a></td>
            <td style="font-size:.78rem;color:#64748B;">${esc(r.service || '—')}</td>
            <td><span class="badge badge-${r.status}">${r.status}</span></td>
            <td style="font-size:.75rem;color:#94A3B8;">${fmtDate(r.submitted_at)}</td>
            <td>
              <button onclick="viewSubmission(${r.id})"
                style="background:#1D4ED8;color:#fff;border:none;border-radius:5px;
                       padding:.3rem .7rem;font-size:.75rem;cursor:pointer;">
                View
              </button>
            </td>
          </tr>
        `).join('')}
      </tbody>
    </table>`;
}

// ── VIEW SINGLE ───────────────────────────────────────────────
async function viewSubmission(id) {
  currentId = id;
  document.getElementById('modal').classList.add('open');
  document.getElementById('modal-body').innerHTML =
    '<div class="loading"><div class="spinner"></div><br>Loading…</div>';

  try {
    const res  = await fetch(`${API}/admin/submissions/${id}`);
    const json = await res.json();
    if (!json.success) throw new Error();
    const d = json.data;
    document.getElementById('modal-body').innerHTML = `
      <div class="detail-row"><span class="detail-label">Name</span>
        <span class="detail-value">${esc(d.first_name)} ${esc(d.last_name)}</span></div>
      <div class="detail-row"><span class="detail-label">Company</span>
        <span class="detail-value">${esc(d.company || '—')}</span></div>
      <div class="detail-row"><span class="detail-label">Email</span>
        <span class="detail-value"><a href="mailto:${esc(d.email)}" style="color:#1D4ED8;">${esc(d.email)}</a></span></div>
      <div class="detail-row"><span class="detail-label">Phone</span>
        <span class="detail-value">${esc(d.phone || '—')}</span></div>
      <div class="detail-row"><span class="detail-label">Service</span>
        <span class="detail-value">${esc(d.service || '—')}</span></div>
      <div class="detail-row"><span class="detail-label">Date</span>
        <span class="detail-value">${fmtDate(d.submitted_at)}</span></div>
      <div class="detail-row"><span class="detail-label">Message</span>
        <span class="detail-value" style="white-space:pre-wrap;">${esc(d.message)}</span></div>
      <div class="detail-row" style="margin-top:1rem;">
        <span class="detail-label">Status</span>
        <span class="detail-value">
          <span class="badge badge-${d.status}">${d.status}</span>
          <select class="status-select" onchange="updateStatus(${d.id}, this.value)">
            <option value="">Change status…</option>
            <option value="new">New</option>
            <option value="read">Read</option>
            <option value="replied">Replied</option>
            <option value="archived">Archived</option>
          </select>
        </span>
      </div>
      <div style="margin-top:1.5rem;display:flex;gap:.7rem;">
        <a href="mailto:${esc(d.email)}?subject=Re: ${esc(d.service || 'Your Enquiry')} - PileTeST Consultants"
           style="background:#15803D;color:#fff;padding:.5rem 1rem;border-radius:6px;font-size:.82rem;font-weight:600;">
          ✉️ Reply by Email
        </a>
        <button onclick="deleteSubmission(${d.id})"
          style="background:#DC2626;color:#fff;border:none;border-radius:6px;
                 padding:.5rem 1rem;font-size:.82rem;font-weight:600;cursor:pointer;">
          🗑️ Delete
        </button>
      </div>`;
    loadStats();
    loadSubmissions(currentFilter);
  } catch {
    document.getElementById('modal-body').innerHTML =
      '<div style="color:#DC2626;">Failed to load submission.</div>';
  }
}

async function updateStatus(id, status) {
  if (!status) return;
  try {
    await fetch(`${API}/admin/submissions/${id}/status`, {
      method: 'PATCH',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ status }),
    });
    alert(`Status updated to "${status}"`);
    closeModal();
    loadSubmissions(currentFilter);
    loadStats();
  } catch { alert('Failed to update status.'); }
}

async function deleteSubmission(id) {
  if (!confirm('Delete this submission? This cannot be undone.')) return;
  try {
    await fetch(`${API}/admin/submissions/${id}`, { method: 'DELETE' });
    closeModal();
    loadSubmissions(currentFilter);
    loadStats();
  } catch { alert('Failed to delete.'); }
}

function closeModal() {
  document.getElementById('modal').classList.remove('open');
}
document.getElementById('modal').addEventListener('click', e => {
  if (e.target === e.currentTarget) closeModal();
});

// ── ANALYTICS ─────────────────────────────────────────────────
async function loadAnalytics() {
  try {
    const res  = await fetch(`${API}/admin/stats`);
    const json = await res.json();
    if (!json.success) return;
    const ac = document.getElementById('analytics-container');
    if (!json.byService.length) {
      ac.innerHTML = '<div class="empty-state"><div class="es-icon">📊</div><div>No data yet.</div></div>';
      return;
    }
    const max = Math.max(...json.byService.map(r => r.count));
    ac.innerHTML = `<div style="padding:1.5rem;">` +
      json.byService.map(r => `
        <div style="margin-bottom:1rem;">
          <div style="display:flex;justify-content:space-between;font-size:.82rem;margin-bottom:.3rem;">
            <span>${esc(r.service)}</span>
            <span style="font-weight:700;">${r.count}</span>
          </div>
          <div style="background:#E2E8F0;border-radius:100px;height:8px;overflow:hidden;">
            <div style="width:${(r.count/max*100).toFixed(0)}%;height:100%;background:#00C896;border-radius:100px;"></div>
          </div>
        </div>`).join('') + `</div>`;
  } catch { }
}

// ── UTILS ─────────────────────────────────────────────────────
function esc(str) {
  if (!str) return '';
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
function fmtDate(dt) {
  if (!dt) return '—';
  return new Date(dt).toLocaleString('en-GB', {
    day:'2-digit',month:'short',year:'numeric',hour:'2-digit',minute:'2-digit'
  });
}
</script>
  <script src="main.js"></script>
</body></html>
